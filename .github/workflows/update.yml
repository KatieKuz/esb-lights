name: Update ESB lighting data

on:
  schedule:
    - cron: "0 11 * * *"   
  workflow_dispatch:         # adds a manual "Run" button for testing

permissions:
  contents: write            # allow the robot to commit the JSON back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add esb_tonight.json
          git diff --cached --quiet || git commit -m "Update tonight's lighting"
          git push
